# ============================================================
# setup.cfg
# Configuracion de pytest, cobertura y flake8
# Proyecto: AB Final - Programming & Coding - MSMK 2025-2026
# ============================================================

[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

[coverage:run]
# Excluir cli.py porque es el punto de entrada y se testea manualmente
omit =
    cli.py
    cli_commands/*
    tests/*
    venv/*
    setup.cfg

[coverage:report]
# Mostrar lineas que no tienen cobertura
show_missing = True
# Fallar si la cobertura total es menor al 80%
fail_under = 80

[flake8]
max-line-length = 99
exclude =
    venv,
    __pycache__,
    .git,
    .github
extend-ignore = E203, W503
per-file-ignores =
    tests/*.py: E302
