# ============================================================
# .github/workflows/ci.yml
# Workflow de Integracion Continua (CI)
# Se ejecuta en cada push y pull request a main y develop
# Proyecto: AB Final - Programming & Coding - MSMK 2025-2026
# ============================================================

name: Integracion Continua

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "fix/**"
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint:
    name: Calidad de Codigo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install flake8==7.0.0
      - run: |
          flake8 . \
            --max-line-length=99 \
            --exclude=venv,__pycache__,.git \
            --extend-ignore=E402 \
            --statistics

  test:
    name: Tests y Cobertura
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v --cov=. --cov-report=term-missing --tb=short
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7

  performance:
    name: Performance Test NF1
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: pytest tests/test_performance.py -v --tb=short